<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- 공통: 토큰·레이아웃·가이드 스킨. extraCss: 'hangul' | 'long' | null -->
    <th:block th:fragment="jamminHead (extraCss)">
        <link th:href="@{/css/jammin-tokens.css}" rel="stylesheet" />
        <link th:href="@{/css/jammin-layout.css}" rel="stylesheet" />
        <link th:href="@{/css/jammin-guide.css}" rel="stylesheet" />
        <link th:href="@{/css/jammin-ui.css}" rel="stylesheet" />
        <link th:if="${extraCss == 'hangul'}" th:href="@{/css/jammin-hangul-worksheet.css}" rel="stylesheet" />
        <link th:if="${extraCss == 'long'}" th:href="@{/css/jammin-long-practice.css}" rel="stylesheet" />
    </th:block>

    <nav th:fragment="jamminNav" class="navbar navbar-expand-lg navbar-dark jammin-nav fixed-top" id="mainNav">
        <div class="container jammin-page-shell">
            <a class="navbar-brand" th:href="@{/}"><img th:src="@{/img/navbar-logo.png}" alt="초민정음" /></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                Menu
                <i class="fas fa-bars ms-1"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${navActive} == 'help' ? ' active'" th:href="@{/help}">도움말</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${navActive} == 'test' ? ' active'" th:href="@{/test}">받아쓰기</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${navActive} == 'test2' ? ' active'" th:href="@{/test2}">테스트</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${navActive} == 'practice' ? ' active'" th:href="@{/practice}">긴글연습</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${navActive} == 'paper' ? ' active'" th:href="@{/paper}">자료실</a>
                    </li>
                    <li class="nav-item" th:if="${showGuide}">
                        <a class="nav-link jammin-nav-guide" href="#" id="guideStartBtn"><i class="fas fa-question-circle"></i> 사용가이드</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</body>
</html>
